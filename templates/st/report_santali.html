{% extends "st/portal_santali.html" %}

{% block content %}
<div class="container">
    <div class="page-header compact">
        <h1 class="page-title">ᱫᱟᱜ ᱜᱟᱹᱦᱤᱨ ᱨᱤᱯᱚᱨᱴ ᱢᱮ</h1>
        <p class="page-subtitle">ᱥᱟᱹᱜᱟᱹᱭ ᱯᱷᱚᱴᱚ ᱥᱟᱶ ᱨᱤᱯᱚᱨᱴ ᱡᱚᱢᱟ ᱠᱟᱛᱮ ᱟᱢᱟᱜ ᱡᱟᱭᱜᱟ ᱨᱮ ᱫᱟᱜ ᱞᱮᱵᱷᱮᱞ ᱧᱮᱞ ᱥᱟᱸᱵᱽ ᱨᱮ ᱜᱚᱲᱚ ᱢᱮ</p>
    </div>

    <form id="reportForm" class="card compact-form" enctype="multipart/form-data">
        <div class="form-section">
            <div class="form-grid">
                <div class="form-group">
                    <label>ᱧᱩᱛᱩᱢ</label>
                    <input type="text" name="name" class="form-input">
                </div>
                <div class="form-group">
                    <label>ᱯᱷᱚᱱ</label>
                    <input type="tel" name="phone" id="phone" class="form-input" minlength="10">
                </div>
            </div>
        </div>

        <div class="form-section">
            <div class="form-grid">
                <div class="form-group">
                    <label>ᱥᱚᱲᱚᱠ/ᱡᱟᱭᱜᱟ</label>
                    <input type="text" name="street" id="street" class="form-input">
                </div>
                <div class="form-group">
                    <label>ᱡᱚᱱ/ᱮᱞᱟᱠᱟ</label>
                    <input type="text" id="zone" name="zone" class="form-input">
                </div>
            </div>
        </div>

        <div class="form-section">
            <label class="section-label-inline">ᱥᱟᱹᱜᱟᱹᱭ ᱡᱤᱱᱤᱥ</label>
            <div class="reference-selector">
                <div class="reference-option selected" data-type="car">
                    <img src="/static/carsvg.svg" alt="ᱠᱟᱨ">
                    <span>ᱠᱟᱨ</span>
                </div>
                <div class="reference-option" data-type="autorickshaw">
                    <img src="/static/autorickshaw.svg" alt="ᱚᱴᱚ">
                    <span>ᱚᱴᱚ</span>
                </div>
                <div class="reference-option" data-type="bike">
                    <img src="/static/bikesvg.svg" alt="ᱵᱟᱭᱤᱠ">
                    <span>ᱵᱟᱭᱤᱠ</span>
                </div>
                <div class="reference-option" data-type="cycle">
                    <img src="/static/bicycle.svg" alt="ᱥᱟᱭᱤᱠᱮᱞ">
                    <span>ᱥᱟᱭᱤᱠᱮᱞ</span>
                </div>
                <div class="reference-option" data-type="person">
                    <img src="/static/person.svg" alt="ᱦᱚᱲ">
                    <span>ᱦᱚᱲ</span>
                </div>
            </div>
            <input type="hidden" name="vehicle_type" id="vehicle_type" value="car">
        </div>

        <div class="form-section">
            <div class="depth-section">
                <div class="depth-header">
                    <div class="depth-display">
                        <span class="depth-value" id="depthValue">0</span>
                        <span class="depth-unit-label" id="depthUnitLabel">ᱢᱤ</span>
                    </div>
                    <span class="depth-status" id="depthStatus">ᱫᱟᱜ ᱵᱟᱹᱱᱩᱜᱼᱟ</span>
                </div>

                <div class="unit-selector">
                    <button type="button" class="unit-btn active" data-unit="meter">ᱢᱤᱴᱚᱨ</button>
                    <button type="button" class="unit-btn" data-unit="feet">ᱯᱷᱤᱴ</button>
                    <button type="button" class="unit-btn" data-unit="cm">ᱥᱮᱱᱴᱤᱢᱤᱴᱚᱨ</button>
                </div>

                <div class="depth-visual-container">
                    <div class="reference-display" id="referenceDisplay">
                        <img id="referenceImg" src="/static/carsvg.svg" alt="ᱥᱟᱹᱜᱟᱹᱭ">
                    </div>
                    <div class="water-level" id="waterLevel"></div>
                </div>

                <div class="depth-controls">
                    <div class="slider-row">
                        <span>0</span>
                        <input type="range" name="flood_depth_cm" id="flood_depth_cm" min="0" max="200" value="0">
                        <span>200</span>
                    </div>
                    <div class="depth-input-group">
                        <label for="depth_input">ᱜᱟᱹᱦᱤᱨ:</label>
                        <input type="number" id="depth_input" min="0" max="200" value="0" step="any">
                        <span id="inputUnit">ᱢᱤ</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="form-section">
            <label class="section-label-inline">ᱯᱷᱚᱴᱚ ᱯᱨᱚᱢᱟᱱ</label>
            <div class="photo-buttons">
                <button type="button" class="btn btn-primary" onclick="openGallery()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="18" height="18" rx="2" />
                        <circle cx="8.5" cy="8.5" r="1.5" />
                        <path d="m21 15-5-5L5 21" />
                    </svg>
                    ᱜᱮᱞᱟᱨᱤ ᱠᱷᱚᱱ ᱟᱯᱞᱚᱰ ᱢᱮ
                </button>
                <button type="button" class="btn btn-primary" onclick="openCamera()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z" />
                        <circle cx="12" cy="13" r="4" />
                    </svg>
                    ᱯᱷᱚᱴᱚ ᱛᱚᱞ ᱢᱮ
                </button>
            </div>
            <input type="file" name="photo" id="photo" accept="image/*" style="display: none;" onchange="handlePhotoSelect(this)">
            <input type="file" id="photoGallery" accept="image/*" style="display: none;" onchange="handlePhotoSelect(this)">
            <div id="photoPreview" class="photo-preview hidden">
                <img id="previewImg" alt="ᱯᱷᱚᱴᱚ ᱧᱮᱞ">
                <p id="photoName"></p>
            </div>
        </div>

        <div class="form-section">
            <div class="form-group">
                <label>ᱴᱤᱯᱯᱚᱬᱤ</label>
                <textarea name="remarks" class="form-textarea" rows="2" placeholder="ᱮᱴᱟᱜ ᱧᱮᱞ - ᱥᱚᱲᱚᱠ ᱚᱵᱚᱥᱛᱷᱟ, ᱵᱟᱧᱪᱟᱣ ᱞᱟᱹᱠᱛᱤ, ᱯᱨᱚᱵᱷᱟᱵᱤᱛ ᱡᱟᱭᱜᱟ (ᱵᱤᱠᱚᱞᱯᱤᱠ)"></textarea>
            </div>
        </div>

        <div class="gps-status" id="gpsStatus">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                <circle cx="8" cy="8" r="3" fill="currentColor" />
            </svg>
            <span id="gpsText">GPS ᱡᱟᱭᱜᱟ ᱧᱟᱢᱚᱜ ᱠᱟᱱᱟ...</span>
        </div>
        <input type="hidden" name="gps_lat" id="gps_lat">
        <input type="hidden" name="gps_lon" id="gps_lon">
        <input type="hidden" name="gps_accuracy" id="gps_accuracy">

        <div class="g-recaptcha" data-sitekey="6LcY9TksAAAAAOo51izipzTF1-bqyex-HyEjJn2Q" style="margin: 20px 0;"></div>

        <button type="submit" class="btn btn-primary btn-submit">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M22 2L11 13" />
                <path d="M22 2L15 22L11 13L2 9L22 2Z" />
            </svg>
            ᱫᱟᱜ ᱨᱤᱯᱚᱨᱴ ᱡᱚᱢᱟ ᱢᱮ
        </button>
        <div id="formStatus" class="status-msg hidden"></div>
    </form>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/report.js"></script>
{% endblock %}
