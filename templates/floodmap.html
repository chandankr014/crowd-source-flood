{% extends "portal.html" %}

{% block content %}
<div id="mapContainer" class="map-container">
    <div id="map" class="map-view"></div>
    
    <!-- Top gradient for control readability on satellite -->
    <div class="map-top-gradient"></div>

    <!-- Connection Status Pill (top-left) -->
    <div class="fm-status-bar" id="fmStatusBar">
        <div class="fm-status-pill" id="fmStatusPill">
            <span class="fm-status-dot live" id="fmStatusDot"></span>
            <span class="fm-status-text" id="fmStatusText">LIVE</span>
            <span class="fm-status-divider"></span>
            <span class="fm-report-count" id="fmReportCount">0 reports</span>
        </div>
    </div>

    <!-- Map Controls (top-right) -->
    <div class="fm-controls" id="fmControls">
        <div class="fm-control-group">
            <button class="fm-btn active" id="basemapSatellite" onclick="setBasemap('satellite')" title="Satellite">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
                    <circle cx="12" cy="12" r="10"/>
                    <path d="M2 12h20"/>
                    <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
                </svg>
            </button>
            <button class="fm-btn" id="basemapRoadmap" onclick="setBasemap('roadmap')" title="Streets">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
                    <rect x="3" y="3" width="18" height="18" rx="2"/>
                    <path d="M9 3v18"/><path d="M15 3v18"/>
                    <path d="M3 9h18"/><path d="M3 15h18"/>
                </svg>
            </button>
            <button class="fm-btn" id="basemapHybrid" onclick="setBasemap('hybrid')" title="Hybrid">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
                    <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
                    <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
                </svg>
            </button>
        </div>
        <div class="fm-control-group fm-actions">
            <button class="fm-btn" onclick="toggleFullscreen()" title="Fullscreen">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
                    <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>
                </svg>
            </button>
            <button class="fm-btn" onclick="manualRefresh()" title="Refresh">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
                    <polyline points="23 4 23 10 17 10"/>
                    <polyline points="1 20 1 14 7 14"/>
                    <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
                </svg>
            </button>
        </div>
    </div>

    <!-- Legend Panel (bottom-left, collapsible) -->
    <div class="fm-legend" id="fmLegend">
        <div class="fm-legend-header" onclick="toggleLegend()">
            <span>Depth Legend</span>
            <svg class="fm-legend-chevron" id="fmLegendChevron" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
                <polyline points="6 9 12 15 18 9"/>
            </svg>
        </div>
        <div class="fm-legend-body" id="fmLegendBody">
            <div class="fm-legend-item"><span class="fm-legend-swatch" style="background:#4CAF50"></span>0–30 cm · Safe</div>
            <div class="fm-legend-item"><span class="fm-legend-swatch" style="background:#FFC107"></span>30–60 cm · Caution</div>
            <div class="fm-legend-item"><span class="fm-legend-swatch" style="background:#FF9800"></span>60–100 cm · Warning</div>
            <div class="fm-legend-item"><span class="fm-legend-swatch" style="background:#F44336"></span>&gt;100 cm · Danger</div>
        </div>
    </div>

    <!-- Latest Report Card (bottom-right, auto-dismiss) -->
    <div class="fm-latest-card" id="fmLatestCard">
        <div class="fm-latest-header">
            <span class="fm-latest-badge">NEW</span>
            <span class="fm-latest-time" id="fmLatestTime"></span>
            <button class="fm-latest-close" onclick="dismissLatestCard()" title="Dismiss">&times;</button>
        </div>
        <div class="fm-latest-body">
            <div class="fm-latest-depth" id="fmLatestDepth">0.00 m</div>
            <div class="fm-latest-location" id="fmLatestLocation">—</div>
            <div class="fm-latest-reporter" id="fmLatestReporter">—</div>
        </div>
    </div>

    <!-- Collapsed Latest pill (shown after auto-dismiss) -->
    <div class="fm-latest-pill" id="fmLatestPill" onclick="expandLatestCard()">
        <span class="fm-latest-pill-dot"></span>
        Latest
    </div>

    <!-- Connection Banner (shown on disconnect) -->
    <div class="fm-conn-banner" id="fmConnBanner">
        <span class="fm-conn-banner-text" id="fmConnBannerText">Connection lost. Retrying...</span>
        <button class="fm-conn-banner-btn" onclick="manualReconnect()">Reconnect</button>
    </div>

    <!-- Toast Container -->
    <div class="fm-toast-container" id="fmToastContainer"></div>

    <!-- Refresh Indicator (spinner) -->
    <div class="fm-refresh-indicator" id="refreshIndicator">
        <div class="fm-spinner"></div>
        <span>Loading...</span>
    </div>
</div>
{% endblock %}

{% block scripts %}
<link rel="stylesheet" href="/static/floodmap.css">
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script>
    window.GOOGLE_API_KEY = "{{ google_api_key }}";
</script>
<script src="/static/floodmap.js"></script>
{% endblock %}
